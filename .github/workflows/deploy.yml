name: 🚀 Deploy NestJS Blog Backend API to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Copy project to VPS
      uses: appleboy/scp-action@v0.1.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: root
        key: ${{ secrets.VPS_KEY }}
        source: "."
        target: "/opt/mosquera-erp-inventario"

    - name: Run deploy commands on VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: root
        key: ${{ secrets.VPS_KEY }}
        script: |
          set -e
          cd /opt/mosquera-erp-inventario

          # Volver a inyectar las variables del .env actualizadas
          printf "%s" "${{ secrets.ENV_FILE }}" > .env

          # Instalación limpia y build de NestJS con permisos correctos
          npm ci --unsafe-perm
          npm run build

          # Reinicio inteligente en PM2 para no perder el uptime ni configuraciones
          pm2 restart mosquera-erp-inventario-api --update-env || pm2 start dist/main.js --name mosquera-erp-inventario-api
          pm2 save